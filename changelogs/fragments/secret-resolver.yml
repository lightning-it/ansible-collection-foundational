---
minor_changes:
  - >-
    secret_resolver - Add controller-side, provider-independent secret resolution
    for HashiCorp Vault/HCP Vault, Ansible Vault, 1Password, environment,
    runtime, and generated values, with explicit fallback, Vault KV v2
    write-back, controlled migration, validation, and non-sensitive metadata.
breaking_changes:
  - >-
    collection - Align the declared ansible-core minimum with the existing
    community.general 11.x dependency by requiring ansible-core 2.16 or newer,
    and bound community.hashi_vault to the compatible 6.x release line.
