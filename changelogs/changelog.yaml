---
ancestor: null
releases:
  1.22.0:
    changes:
      minor_changes:
        - foundational - Add Molecule coverage for remote tmp, bridge VLAN membership,
          OOB Redfish, and Terraform state migration scenarios.
        - vmware_vsphere - Improve VM asset, normalization, and management task handling.
        - vmware_vsphere_guest_bootstrap - Expand guest bootstrap configuration and
          task handling.
        - vmware_vsphere_packer_build - Add a role for VMware vSphere Packer template
          build automation.
    fragments:
      - foundational-agents-refactored.yml
    release_date: '2026-06-22'
  1.23.0:
    changes:
      minor_changes:
        - lit.foundational - Verify automated collection release workflow cycle 1.
    fragments:
      - release-verification-1.yml
    release_date: '2026-06-22'
  1.24.0:
    changes:
      minor_changes:
        - lit.foundational - Verify automated collection release workflow cycle 2.
    fragments:
      - release-verification-2.yml
    release_date: '2026-06-22'
  1.26.0:
    changes:
      bugfixes:
        - Fixed kubeplay explicit app task execution so per-app variables are passed
          into included task files and roles.
      minor_changes:
        - Added generic tls_assets, vault_pki_cert, secret_backend, and secret_kv
          foundational roles for reusable TLS and secret handling.
        - Added the podman_systemd role for persistent Podman kube services through
          Quadlet and systemd.
    fragments:
      - foundational-tls-secret-helpers.yml
      - kubeplay-pass-app-vars.yml
      - podman-systemd-role.yml
    release_date: '2026-07-03'
  1.27.0:
    changes:
      breaking_changes:
        - collection - Align the declared ansible-core minimum with the existing community.general
          11.x dependency by requiring ansible-core 2.16 or newer, and bound community.hashi_vault
          to the compatible 6.x release line.
      bugfixes:
        - hetzner_installimage - Document every argument-spec option so ansible-doc
          accepts the role metadata on current execution images.
      minor_changes:
        - Add the controller-local ``ansible_vault_secret_document`` action plugin
          for immutable, CAS-safe creation and validation of encrypted secret documents
          with Ansible's already-loaded Vault identity.
        - Add the controller-only ``ansible_vault_document`` action plugin for atomic,
          immutable, type-exact persistence of structured mappings with Ansible's
          already-loaded Vault identities and no plaintext filesystem staging.
        - docs - Apply the shared enterprise README structure.
        - docs - Consolidate generated governance metadata and license policy on shared-assets-lit.
        - hetzner_installimage - Add serial-bound Hetzner Rescue installation planning,
          immutable approval hashes, independent destructive gates, encrypted-layout
          support, recovery-password artifact sanitization, preserved-disk protection,
          Rescue SSH-key takeover validation, and optional checksummed post-install
          scripts.
        - release_model - Add managed compatibility matrix documentation and structured
          release evidence fields.
        - secret_resolver - Add controller-side, provider-independent secret resolution
          for HashiCorp Vault/HCP Vault, Ansible Vault, 1Password, environment, runtime,
          and generated values, with explicit fallback, Vault KV v2 write-back, controlled
          migration, validation, and non-sensitive metadata.
    fragments:
      - ansible-vault-document.yml
      - ansible-vault-secret-document.yml
      - compatibility-release-evidence.yml
      - enterprise-readme-standard.yml
      - hetzner-installimage.yml
      - secret-resolver.yml
      - shared-assets-lit-governance.yml
    modules:
      - description: Persist an exact immutable mapping as Ansible Vault ciphertext.
        name: ansible_vault_document
        namespace: ''
      - description: Create an immutable local Ansible Vault secret document.
        name: ansible_vault_secret_document
        namespace: ''
    release_date: '2026-07-12'
  1.28.0:
    changes:
      breaking_changes:
        - collection - raise the minimum supported ansible-core release from 2.16
          to 2.18, matching the supported floor of the required hetzner.hcloud 6.x
          collection.
        - secret_resolver - rename the public ``lit_secret_resolver_*`` variables
          and outputs to the mandatory role-prefixed ``secret_resolver_*`` interface.
      bugfixes:
        - hetzner_installimage - discover the single Hetzner installimage working
          directory when ``FOLD`` is not exported to the post-mount hook, and reject
          unsafe or ambiguous working directories.
      minor_changes:
        - ansible_vault_document - raise the fixed plaintext and ciphertext safety
          limit from 64 MiB to 128 MiB for larger encrypted documents.
        - hetzner_cloud - Add controller-side, IPv4-only, declarative Hetzner Cloud
          reconciliation with official hetzner.hcloud modules for SSH keys, firewalls,
          Networks, subnetworks, Primary and Floating IPs, placement groups, servers,
          exact private Network attachments, firewall relationships, reverse DNS,
          guarded deletion, fixed-address adoption, dynamic-inventory guidance, and
          read-only guest Floating IP detection.
        - hetzner_rescue_validate - add reusable controller trust, Rescue-system identity,
          disk, shared SMART, egress, data-plane, and installed-LUKS validation entrypoints.
        - hetzner_robot_cac - add declarative Hetzner Robot resource reconciliation
          and read-only server, firewall, and vSwitch drift auditing through community.hrobot
          modules.
        - hetzner_robot_ops - add separately gated Rescue boot and dedicated-server
          reset operations.
    fragments:
      - ansible-vault-document-limit.yml
      - hetzner-cloud.yml
      - hetzner-installimage-sanitizer.yml
      - hetzner-robot.yml
      - secret-resolver-role-prefix.yml
    release_date: '2026-07-13'
