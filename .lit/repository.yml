---
schema_version: 1
managed_by: lightning-it/shared-assets-lit
repository: ansible-collection-foundational
visibility: public
license_spdx: MIT
repository_type: ansible_collection
release_type: ansible_galaxy
artifact_type: ansible_collection_tarball
test_profiles:
  - pre-commit
  - lint
  - light
  - molecule-light
  - release-validation
os_matrix:
  - ubuntu-latest
product_matrix:
  - ansible-core
  - molecule
publishing_targets:
  - github-release
  - ansible-galaxy
galaxy_publish: true
quay_publish: false
release_evidence: true
heavy_incus_required: false
openssf_best_practices:
  required: true
  project_id: null
  target_level: passing
  exception: null
readme_badges:
  - ci
  - pre-commit
  - ansible-lint
  - molecule
  - release
  - galaxy
  - license
workflows:
  ci: collection-ci.yml
  release: collection-publish.yml
  promote: promote-develop-to-main.yml
  backmerge: release-back-sync.yml
