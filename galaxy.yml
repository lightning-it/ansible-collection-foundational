---
namespace: lit
name: foundational
version: 1.22.0
readme: README.md
description: Foundational Ansible collection for ModuLix, providing base roles, helpers,
  and Terraform/Terragrunt runner building blocks for platform automation.
repository: https://github.com/lightning-it/ansible-collection-foundational
authors:
  - Lightning IT
license:
  - MIT
tags:
  - terraform
  - modulix
  - security
  - automation
dependencies:
  community.general: '>=11.4.9,<12.0.0'
  ansible.posix: '>=2.2.0'
  community.docker: '*'
  community.vmware: 5.10.0
  vmware.vmware: '>=2.9.0'
build_ignore:
  - .ansible
  - .cache
  - .pytest_cache
  - .tox
  - .venv
  - node_modules
  - vagrant
  - .git
  - .github
  - .gitignore
  - .molecule
  - collections
  - ansible_collections
  - build
  - dist
  - infra
  - molecule
  - '*.terraform*'
  - '*.tar.gz'
