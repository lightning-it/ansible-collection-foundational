---
- name: Normalize kubeplay podman action variables
  ansible.builtin.set_fact:
    _kubeplay_action: "{{ kubeplay_action | default((kubeplay_app.vars | default({})).kubeplay_action | default('')) }}"
    _kubeplay_pod_name: "{{ kubeplay_pod_name | default((kubeplay_app.vars | default({})).kubeplay_pod_name | default('')) }}"
    _kubeplay_pod_manifest_path: >-
      {{
        kubeplay_pod_manifest_path
        | default((kubeplay_app.vars | default({})).kubeplay_pod_manifest_path | default(''))
      }}
  changed_when: false

- name: Validate kubeplay action
  ansible.builtin.assert:
    that:
      - _kubeplay_action in ['recreate', 'run', 'restart', 'remove']
    fail_msg: "kubeplay_action must be one of: recreate, run, restart, remove."

- name: Validate kubeplay pod name
  ansible.builtin.assert:
    that:
      - _kubeplay_pod_name | length > 0
    fail_msg: "kubeplay_pod_name must be set."

- name: Validate kubeplay manifest path
  ansible.builtin.assert:
    that:
      - _kubeplay_pod_manifest_path | length > 0
    fail_msg: "kubeplay_pod_manifest_path must be set for action '{{ _kubeplay_action }}'."
  when: _kubeplay_action in ['recreate', 'run']

- name: Remove pod before kube play
  ansible.builtin.command: "podman pod rm -f {{ _kubeplay_pod_name }}"
  register: kubeplay_pod_remove
  failed_when: kubeplay_pod_remove.rc not in [0, 1, 2, 125]
  changed_when: "'deleted' in kubeplay_pod_remove.stdout"
  when: _kubeplay_action in ['recreate', 'remove']

- name: Run podman kube play
  ansible.builtin.command: "podman kube play {{ _kubeplay_pod_manifest_path }}"
  register: kubeplay_pod_start
  changed_when: >-
    'created' in kubeplay_pod_start.stdout or 'configured' in kubeplay_pod_start.stdout
  when: _kubeplay_action in ['recreate', 'run']

- name: Restart pod
  ansible.builtin.command: "podman pod restart {{ _kubeplay_pod_name }}"
  register: kubeplay_pod_restart
  changed_when: kubeplay_pod_restart.rc == 0
  failed_when: kubeplay_pod_restart.rc != 0
  when: _kubeplay_action == 'restart'
