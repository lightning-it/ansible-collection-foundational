---
- name: Bootstrap Ansible remote tmp directory with raw command
  ansible.builtin.raw: |
    set -eu
    path={{ ansible_remote_tmp_path | default('', true) | quote }}
    owner={{ ansible_remote_tmp_owner | quote }}
    group={{ ansible_remote_tmp_group | quote }}
    mode={{ ansible_remote_tmp_mode | quote }}
    if [ -n "$path" ]; then
      mkdir -p -- "$path"
      chown "$owner:$group" "$path"
      chmod "$mode" "$path"
    fi
  become: true
  changed_when: false
  when:
    - ansible_remote_tmp_enabled | bool
    - ansible_remote_tmp_bootstrap_raw | bool
    - ansible_remote_tmp_path | default('', true) | trim | length > 0

- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Skip ansible_remote_tmp role when disabled
  ansible.builtin.meta: end_host
  when: not (ansible_remote_tmp_enabled | bool)

- name: Ensure Ansible remote tmp directory exists
  ansible.builtin.file:
    path: "{{ ansible_remote_tmp_path }}"
    state: directory
    owner: "{{ ansible_remote_tmp_owner }}"
    group: "{{ ansible_remote_tmp_group }}"
    mode: "{{ ansible_remote_tmp_mode }}"
  become: true

- name: Validate configured users can write to Ansible remote tmp
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import os
        import tempfile
        path = tempfile.mkdtemp(prefix="ansible-remote-tmp-", dir="{{ ansible_remote_tmp_path }}")
        print(path)
        os.rmdir(path)
  become: true
  become_user: "{{ ansible_remote_tmp_validate_user }}"
  changed_when: false
  loop: "{{ ansible_remote_tmp_validate_users | reject('equalto', '') | list }}"
  loop_control:
    loop_var: ansible_remote_tmp_validate_user
    label: "{{ ansible_remote_tmp_validate_user }}"
