---
- name: Reset 1Password provider response state
  ansible.builtin.set_fact:
    __secret_resolver_onepassword_items: []
    __secret_resolver_onepassword_matching_fields: []
    __secret_resolver_onepassword_lookup_succeeded: false
  changed_when: false
  no_log: true

- name: Check the controller 1Password CLI dependency
  ansible.builtin.command:
    argv:
      - op
      - --version
  register: __secret_resolver_onepassword_version
  changed_when: false
  failed_when: false
  check_mode: false
  no_log: true

- name: Categorize a missing controller 1Password CLI dependency
  ansible.builtin.set_fact:
    __secret_resolver_attempt_found: false
    __secret_resolver_attempt_failure: dependency_missing
  changed_when: false
  no_log: true
  when: >-
    (__secret_resolver_onepassword_version.rc != 0)
    or (__secret_resolver_onepassword_version.stdout | default('') is not match('^2\.'))

- name: Build the controller 1Password authentication check
  ansible.builtin.set_fact:
    __secret_resolver_onepassword_whoami_argv: >-
      {{
        ['op', 'whoami', '--format=json']
        +
        (
          ['--account', __secret_resolver_request.onepassword.account]
          if (__secret_resolver_request.onepassword.account is defined)
          else []
        )
      }}
  changed_when: false
  no_log: true
  when:
    - __secret_resolver_onepassword_version.rc == 0
    - __secret_resolver_onepassword_version.stdout | default('') is match('^2\.')

- name: Check the controller 1Password authentication context
  ansible.builtin.command:
    argv: "{{ __secret_resolver_onepassword_whoami_argv }}"
  register: __secret_resolver_onepassword_whoami
  changed_when: false
  failed_when: false
  check_mode: false
  no_log: true
  when:
    - __secret_resolver_onepassword_version.rc == 0
    - __secret_resolver_onepassword_version.stdout | default('') is match('^2\.')

- name: Categorize an unavailable 1Password authentication context
  ansible.builtin.set_fact:
    __secret_resolver_attempt_found: false
    __secret_resolver_attempt_failure: >-
      {%- set failure_text =
        (
          (__secret_resolver_onepassword_whoami.msg | default(''))
          ~ ' '
          ~ (__secret_resolver_onepassword_whoami.stderr | default(''))
        )
        | lower
      -%}
      {%- if
        'certificate verify failed' in failure_text
        or 'tls handshake' in failure_text
        or 'sslerror' in failure_text
      -%}
      tls_failed
      {%- elif
        'connection' in failure_text
        or 'timed out' in failure_text
        or 'unavailable' in failure_text
        or 'network' in failure_text
      -%}
      provider_unavailable
      {%- else -%}
      authentication_failed
      {%- endif -%}
  changed_when: false
  no_log: true
  when:
    - __secret_resolver_onepassword_version.rc == 0
    - __secret_resolver_onepassword_version.stdout | default('') is match('^2\.')
    - __secret_resolver_onepassword_whoami.rc != 0

- name: Build non-secret 1Password lookup options
  ansible.builtin.set_fact:
    __secret_resolver_onepassword_options: >-
      {{
        {}
        | combine(
            {'vault': __secret_resolver_request.onepassword.vault}
            if (__secret_resolver_request.onepassword.vault is defined)
            else {}
          )
        | combine(
            {'account_id': __secret_resolver_request.onepassword.account}
            if (__secret_resolver_request.onepassword.account is defined)
            else {}
          )
        | combine(
            {'section': __secret_resolver_request.onepassword.section}
            if (__secret_resolver_request.onepassword.section is defined)
            else {}
          )
      }}
  changed_when: false
  no_log: true
  when:
    - __secret_resolver_onepassword_version.rc == 0
    - __secret_resolver_onepassword_version.stdout | default('') is match('^2\.')
    - __secret_resolver_onepassword_whoami.rc == 0

- name: Read a complete 1Password item without logging it
  when:
    - __secret_resolver_onepassword_version.rc == 0
    - __secret_resolver_onepassword_version.stdout | default('') is match('^2\.')
    - __secret_resolver_onepassword_whoami.rc == 0
  block:
    - name: Query the controller 1Password item
      ansible.builtin.set_fact:
        __secret_resolver_onepassword_items: >-
          {{
            query(
              'community.general.onepassword_raw',
              __secret_resolver_request.onepassword.item,
              **__secret_resolver_onepassword_options
            )
          }}
        __secret_resolver_onepassword_lookup_succeeded: true
      changed_when: false
      no_log: true
  rescue:
    - name: Categorize a failed 1Password item lookup
      ansible.builtin.set_fact:
        __secret_resolver_attempt_found: false
        __secret_resolver_attempt_failure: >-
          {%- set failure_text = ansible_failed_result.msg | default('') | lower -%}
          {%- if 'not found' in failure_text or 'isn''t an item' in failure_text -%}
          secret_not_found
          {%- elif 'forbidden' in failure_text or 'permission denied' in failure_text -%}
          authorization_failed
          {%- elif
            'certificate verify failed' in failure_text
            or 'tls handshake' in failure_text
            or 'sslerror' in failure_text
          -%}
          tls_failed
          {%- elif
            'connection' in failure_text
            or 'timed out' in failure_text
            or 'unavailable' in failure_text
            or 'network' in failure_text
          -%}
          provider_unavailable
          {%- elif
            'sign in' in failure_text
            or 'session' in failure_text
            or 'authentication' in failure_text
          -%}
          authentication_failed
          {%- else -%}
          invalid_response
          {%- endif -%}
      changed_when: false
      no_log: true

- name: Initialize 1Password field matching
  ansible.builtin.set_fact:
    __secret_resolver_onepassword_matching_fields: []
    __secret_resolver_onepassword_item_shape_valid: >-
      {{
        __secret_resolver_onepassword_items | length > 0
        and __secret_resolver_onepassword_items[0] is mapping
        and __secret_resolver_onepassword_items[0].fields is defined
        and __secret_resolver_onepassword_items[0].fields is sequence
        and __secret_resolver_onepassword_items[0].fields is not string
        and __secret_resolver_onepassword_items[0].fields is not mapping
      }}
    __secret_resolver_attempt_failure: >-
      {{
        'secret_not_found'
        if (__secret_resolver_onepassword_items | default([]) | length == 0)
        else
        (
          'secret_key_missing'
          if
          (
            __secret_resolver_onepassword_items[0] is mapping
            and __secret_resolver_onepassword_items[0].fields is defined
            and __secret_resolver_onepassword_items[0].fields is sequence
            and __secret_resolver_onepassword_items[0].fields is not string
            and __secret_resolver_onepassword_items[0].fields is not mapping
          )
          else 'invalid_response'
        )
      }}
  changed_when: false
  no_log: true
  when: __secret_resolver_onepassword_lookup_succeeded | bool

- name: Match the requested 1Password field by ID or label
  ansible.builtin.set_fact:
    __secret_resolver_onepassword_matching_fields: >-
      {{ __secret_resolver_onepassword_matching_fields + [__secret_resolver_onepassword_field] }}
  loop: >-
    {{
      __secret_resolver_onepassword_items[0].fields
      if
      (
        __secret_resolver_onepassword_items | default([]) | length > 0
        and __secret_resolver_onepassword_items[0] is mapping
        and __secret_resolver_onepassword_items[0].fields is defined
        and __secret_resolver_onepassword_items[0].fields is sequence
        and __secret_resolver_onepassword_items[0].fields is not string
        and __secret_resolver_onepassword_items[0].fields is not mapping
      )
      else []
    }}
  loop_control:
    loop_var: __secret_resolver_onepassword_field
    label: field
  changed_when: false
  no_log: true
  when: >-
    __secret_resolver_onepassword_lookup_succeeded | default(false) | bool
    and
    (
      (__secret_resolver_onepassword_field.id | default('') | lower
       == __secret_resolver_request.onepassword.field | lower)
      or
      (__secret_resolver_onepassword_field.label | default('') | lower
       == __secret_resolver_request.onepassword.field | lower)
    )
    and
    (
      __secret_resolver_request.onepassword.section is not defined
      or
      (
        __secret_resolver_onepassword_field.section is defined
        and
        (
          __secret_resolver_onepassword_field.section.id | default('') | lower
          == __secret_resolver_request.onepassword.section | lower
          or
          __secret_resolver_onepassword_field.section.label | default('') | lower
          == __secret_resolver_request.onepassword.section | lower
        )
      )
    )

- name: Normalize the requested 1Password field
  ansible.builtin.set_fact:
    __secret_resolver_attempt_found: >-
      {{
        __secret_resolver_onepassword_matching_fields | length == 1
        and __secret_resolver_onepassword_matching_fields[0].value is defined
      }}
    __secret_resolver_attempt_value: >-
      {{
        __secret_resolver_onepassword_matching_fields[0].value
        if
        (
          __secret_resolver_onepassword_matching_fields | length == 1
          and __secret_resolver_onepassword_matching_fields[0].value is defined
        )
        else none
      }}
    __secret_resolver_attempt_failure: >-
      {{
        none
        if
        (
          __secret_resolver_onepassword_matching_fields | length == 1
          and __secret_resolver_onepassword_matching_fields[0].value is defined
        )
        else
        (
          'invalid_response'
          if (__secret_resolver_onepassword_matching_fields | length > 1)
             or
             (
               __secret_resolver_onepassword_matching_fields | length == 1
               and __secret_resolver_onepassword_matching_fields[0].value is not defined
             )
          else __secret_resolver_attempt_failure
        )
      }}
  changed_when: false
  no_log: true
  when:
    - __secret_resolver_onepassword_items is defined
    - __secret_resolver_onepassword_lookup_succeeded | default(false) | bool

- name: Clear complete 1Password response objects
  ansible.builtin.set_fact:
    __secret_resolver_onepassword_items: []
    __secret_resolver_onepassword_matching_fields: []
    __secret_resolver_onepassword_lookup_succeeded: false
    __secret_resolver_onepassword_item_shape_valid: false
    __secret_resolver_onepassword_options: {}
    __secret_resolver_onepassword_version: {}
    __secret_resolver_onepassword_whoami: {}
    __secret_resolver_onepassword_whoami_argv: []
  changed_when: false
  no_log: true
