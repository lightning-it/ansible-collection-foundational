    label: "{{ hetzner_cloud_floating_ip_item.name | default(hetzner_cloud_floating_ip_item.id | default('unnamed')) }}"
  when: (hetzner_cloud_floating_ip_item.state | default(hetzner_cloud_state)) != 'absent'
