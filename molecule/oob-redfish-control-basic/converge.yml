---
- name: Converge oob redfish control syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    oob_redfish_control_molecule_execute_role: false
  tasks:
    - name: Import lit.foundational.oob_redfish_control for syntax coverage
      ansible.builtin.import_role:
        name: lit.foundational.oob_redfish_control
      when: oob_redfish_control_molecule_execute_role | bool

    - name: Record lit.foundational.oob_redfish_control Molecule coverage mode
      ansible.builtin.copy:
        content: "syntax_stub\n"
        dest: /tmp/lit-foundational-oob-redfish-control-molecule-coverage
        mode: "0644"
