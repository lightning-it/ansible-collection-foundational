---
- name: Verify oob redfish inventory syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Assert lit.foundational.oob_redfish_inventory coverage stub ran
      ansible.builtin.assert:
        that:
          - oob_redfish_inventory_molecule_coverage_mode | default('') == 'syntax_stub'
        quiet: true
