---
- name: Converge bridge vlan membership syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    bridge_vlan_membership_molecule_execute_role: false
  tasks:
    - name: Import lit.foundational.bridge_vlan_membership for syntax coverage
      ansible.builtin.import_role:
        name: lit.foundational.bridge_vlan_membership
      when: bridge_vlan_membership_molecule_execute_role | bool

    - name: Record lit.foundational.bridge_vlan_membership Molecule coverage mode
      ansible.builtin.set_fact:
        bridge_vlan_membership_molecule_coverage_mode: syntax_stub
