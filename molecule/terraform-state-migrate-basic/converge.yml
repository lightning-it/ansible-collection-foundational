---
- name: Converge terraform state migrate syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    terraform_state_migrate_molecule_execute_role: false
  tasks:
    - name: Import lit.foundational.terraform_state_migrate for syntax coverage
      ansible.builtin.import_role:
        name: lit.foundational.terraform_state_migrate
      when: terraform_state_migrate_molecule_execute_role | bool

    - name: Record lit.foundational.terraform_state_migrate Molecule coverage mode
      ansible.builtin.set_fact:
        terraform_state_migrate_molecule_coverage_mode: syntax_stub
