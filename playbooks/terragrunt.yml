---
- name: Example - lit.foundational.terragrunt
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_connection: local
    cluster_id: example
    terragrunt_demo_bin_dir: /tmp/wunder/lit-foundational-example-bin
    terragrunt_source: "./module"
    terragrunt_plan_file: /tmp/terragrunt.plan
    terragrunt_skip_confirmation: true

  pre_tasks:
    - name: Create writable example binary directory
      ansible.builtin.file:
        path: "{{ terragrunt_demo_bin_dir }}"
        state: directory
        mode: "0700"

    - name: Create terragrunt stub in PATH (demo only)
      ansible.builtin.copy:
        dest: "{{ terragrunt_demo_bin_dir }}/terragrunt"
        mode: "0755"
        content: |
          #!/bin/sh
          echo "terragrunt stub $*"
          if [ "$1" = "plan" ]; then
            echo "No objects need to be destroyed"
          fi

  roles:
    - role: lit.foundational.terragrunt

  environment:
    PATH: "{{ terragrunt_demo_bin_dir }}:{{ lookup('ansible.builtin.env', 'PATH') }}"
